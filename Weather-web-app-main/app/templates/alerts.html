{% extends 'base.html' %}
{% block title %}Alerts | Weather Dashboard{% endblock %}
{% block nav_alerts %}active{% endblock %}
{% block content %}
<div class="glass-card p-4 p-lg-5">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
            <h1 class="h3 fw-bold mb-1">Weather Alerts</h1>
            <p class="text-white-50 mb-0">Receive notifications for rain, storms, heat, and wind alerts.</p>
        </div>
        <button class="btn btn-warning fw-semibold" id="enableAlertsBtn">Enable alerts</button>
    </div>

    <div class="row g-3" id="alertGrid"></div>
</div>
{% endblock %}
